apiVersion: apps/v1
kind: Deployment
metadata:
  name: kafka-producer-deployment
spec:
  replicas: 1
  selector:
    matchLabels:
      app: kafka-producer
  template:
    metadata:
      labels:
        app: kafka-producer
    spec:
      containers:
      - name: kafka-producer
        image: sarahema/kafka-producer:4.2.0  # Replace with your actual image name and tag
        ports:
        - containerPort: 9092  # Assuming this is the port your producer listens on
---
apiVersion: v1
kind: Service
metadata:
  name: kafka-producer-service
spec:
  selector:
    app: kafka-producer
  ports:
    - protocol: TCP
      port: 9092  # Port to expose on the Service
      targetPort: 9092  # Port on the Pod
